nodeLinker: pnp

packageExtensions:
  "@dnd-kit/utilities@*":
    dependencies:
      react: ^16.14.0
  "@phenomnomnominal/tsquery@*":
    dependencies:
      typescript: 4.7.4
  "@pmmmwh/react-refresh-webpack-plugin@*":
    dependencies:
      webpack: ^5
  "@storybook/preset-react-webpack@*":
    dependencies:
      webpack: ^5
  "@storybook/react-docgen-typescript-plugin@*":
    dependencies:
      webpack: ^5
  "@storybook/types@*":
    dependencies:
      express: ^4.17.3
  "@types/babel__core@*":
    dependencies:
      "@babel/generator": ^7.21.1
      "@babel/template": ^7.20.7
      "@babel/traverse": ^7.21.2
  "@types/express-serve-static-core@*":
    dependencies:
      events: ^3.2.0
      qs: ^6.10.0
      range-parser: ^1.2.1
  "@types/express@*":
    dependencies:
      body-parser: 1.20.1
      qs: ^6.10.0
      serve-static: 1.15.0
  "@types/react@*":
    dependencies:
      scheduler: ^0.19.1
  "@types/serve-static@*":
    dependencies:
      mime: ^3.0.0
  "@types/styled-components@*":
    dependencies:
      hoist-non-react-statics: ^3.3.1
  debug@*:
    dependencies:
      supports-color: ^4.3.4
  doctrine@*:
    dependencies:
      assert: ^2.0.0
  jest-styled-components@*:
    dependencies:
      pretty-format: ^28.1.3
  node-fetch@*:
    dependencies:
      encoding: ^0.1.13
  rollup@*:
    dependencies:
      source-map-support: ^0.5.16
  ts-node@*:
    dependencies:
      "@types/node": "*"

pnpMode: loose

yarnPath: .yarn/releases/yarn-3.4.1.cjs
